name = "github-pages-chat"
main = "worker.js"
compatibility_date = "2026-06-20"

[vars]
GITHUB_OWNER = "carloschen185"
GITHUB_REPO = "carloschen185.github.io"
GITHUB_BRANCH = "main"
PUBLIC_BASE_URL = "https://carloschen185.github.io"
ALLOWED_ORIGIN = "https://carloschen185.github.io"
MAX_FILE_BYTES = "5242880"
ADMIN_SESSION_SECONDS = "7200"
ADMIN_LOGIN_WINDOW_MS = "900000"
ADMIN_LOGIN_MAX_FAILURES = "8"

[[kv_namespaces]]
binding = "CHAT_ROOMS"
id = "01334eb6b2014247942edc58d0c5a922"
