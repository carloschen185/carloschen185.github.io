<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>小小聊天室 - SYSTEM-MEMZ-C</title>
    <meta name="description" content="输入同一个聊天码，就可以进入同一个小聊天室。">
    <meta name="theme-color" content="#fff4cf">
    <link rel="stylesheet" href="styles.css?v=20260620-quakejs-local">
    <link rel="stylesheet" href="chat.css?v=20260620-chat">
  </head>
  <body class="chat-shell">
    <header class="site-header" aria-label="聊天室导航">
      <a class="brand" href="./">
        <span class="brand-mark" aria-hidden="true">C</span>
        <span>SYSTEM-MEMZ-C</span>
      </a>
      <nav class="nav-links" aria-label="页面导航">
        <a href="./#about">关于</a>
        <a href="./#collection">收藏夹</a>
        <a href="./#games">小游戏</a>
        <a href="chat.html">聊天室</a>
        <a href="admin/">后台</a>
      </nav>
    </header>

    <main class="chat-page">
      <section class="chat-join-panel" data-view="join">
        <div>
          <p class="eyebrow">Tiny Chat</p>
          <h1>输入聊天码，一起开小房间。</h1>
          <p class="intro">同一个聊天码会进入同一个聊天室。可以发文字、emoji 和文件，记录会由后端写入仓库里的聊天记录目录。</p>
        </div>
        <form class="chat-join-form" data-join-form>
          <label>
            <span>你的昵称</span>
            <input name="nickname" maxlength="24" autocomplete="nickname" placeholder="比如：水蜜桃">
          </label>
          <label>
            <span>聊天码</span>
            <input name="room" maxlength="64" required autocomplete="off" placeholder="比如：PEACH-ROOM">
          </label>
          <button class="button primary" type="submit">进入聊天室</button>
        </form>
        <p class="chat-config-warning" data-config-warning hidden>
          聊天后端还没有配置。把 Worker 部署好后，在 chat-config.js 里填入 apiBase 就能真正收发消息。
        </p>
      </section>

      <section class="chat-room" data-view="room" hidden>
        <div class="chat-room-head">
          <div>
            <p class="eyebrow">Room</p>
            <h1 data-room-title>聊天室</h1>
          </div>
          <button class="button secondary" type="button" data-leave-room>换一个聊天码</button>
        </div>

        <div class="chat-window" data-message-list aria-live="polite"></div>

        <form class="chat-compose" data-compose-form>
          <div class="emoji-row" aria-label="常用 emoji">
            <button type="button" data-emoji="😊">😊</button>
            <button type="button" data-emoji="🥰">🥰</button>
            <button type="button" data-emoji="✨">✨</button>
            <button type="button" data-emoji="👍">👍</button>
            <button type="button" data-emoji="😭">😭</button>
            <button type="button" data-emoji="🎮">🎮</button>
          </div>
          <textarea name="text" rows="3" maxlength="2000" placeholder="写点什么，可以直接输入 emoji。"></textarea>
          <div class="compose-actions">
            <label class="file-picker">
              <input name="file" type="file">
              <span>选择文件</span>
            </label>
            <span class="file-name" data-file-name>没有选择文件</span>
            <button class="button primary" type="submit">发送</button>
          </div>
        </form>
      </section>
    </main>

    <script src="chat-config.js?v=20260620-chat"></script>
    <script src="chat.js?v=20260620-chat"></script>
  </body>
</html>
