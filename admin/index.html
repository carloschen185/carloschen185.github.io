<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>聊天后台 - SYSTEM-MEMZ-C</title>
    <meta name="theme-color" content="#fff4cf">
    <meta name="referrer" content="no-referrer">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src 'self' https:; img-src 'self' https: data:; media-src 'self' https:; style-src 'self' 'unsafe-inline'; script-src 'self'; object-src 'none'; base-uri 'none'; form-action 'self'">
    <link rel="stylesheet" href="../styles.css?v=20260620-quakejs-local">
    <link rel="stylesheet" href="../chat.css?v=20260620-chat-secure">
  </head>
  <body>
    <header class="site-header" aria-label="后台导航">
      <a class="brand" href="../">
        <span class="brand-mark" aria-hidden="true">C</span>
        <span>聊天后台</span>
      </a>
      <nav class="nav-links" aria-label="页面导航">
        <a href="../">主页</a>
        <a href="../chat.html">聊天室</a>
      </nav>
    </header>

    <main class="admin-page">
      <section class="section-heading">
        <div>
          <p class="eyebrow">Admin</p>
          <h1>管理聊天记录</h1>
          <p class="section-note">后台需要先登录。密码只发送给 Worker 验证，不写进网页源码，也不会长期保存在浏览器里。</p>
        </div>
      </section>

      <section class="admin-login-panel admin-panel" data-admin-login>
        <label>
          <span class="eyebrow">Password</span>
          <input class="admin-input" data-admin-password type="password" autocomplete="current-password" placeholder="后台密码">
        </label>
        <div class="admin-actions">
          <button class="button primary" type="button" data-admin-login-button>登录后台</button>
        </div>
        <p class="chat-status" data-admin-login-status>输入后台密码进入管理界面。后端地址会由网站配置自动读取。</p>
      </section>

      <section class="admin-grid" data-admin-app hidden>
        <aside class="admin-panel">
          <div class="admin-actions">
            <button class="button secondary" type="button" data-admin-logout>退出登录</button>
          </div>
          <div class="admin-room-list" data-room-list></div>
        </aside>

        <section class="admin-panel">
          <div class="admin-actions">
            <button class="admin-mini-button" type="button" data-refresh-room>刷新</button>
            <button class="admin-mini-button" type="button" data-export-room>导出 JSON</button>
            <button class="admin-mini-button" type="button" data-clear-room>清空房间</button>
          </div>
          <div class="admin-message-list" data-admin-messages>
            <p class="chat-status">先选择一个房间。</p>
          </div>
        </section>
      </section>
    </main>

    <script src="../chat-config.js?v=20260620-chat"></script>
    <script src="admin.js?v=20260620-chat-secure"></script>
  </body>
</html>
