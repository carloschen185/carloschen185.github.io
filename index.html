<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>个人主页</title>
    <meta
      name="description"
      content="一个关于创作、技术与长期作品的个人主页。"
    >
    <meta name="theme-color" content="#f6f1e8">
    <meta property="og:type" content="website">
    <meta property="og:title" content="个人主页">
    <meta
      property="og:description"
      content="一个关于创作、技术与长期作品的个人主页。"
    >
    <meta property="og:image" content="https://avatars.githubusercontent.com/u/178721513?v=4">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="site-header" aria-label="主导航">
      <a class="brand" href="#top" data-profile="name">个人主页</a>
      <nav class="nav-links" aria-label="页面导航">
        <a href="#about">关于</a>
        <a href="#work">方向</a>
        <a href="#projects">项目</a>
        <a href="#contact">联系</a>
      </nav>
    </header>

    <main id="top">
      <section class="hero" aria-labelledby="hero-title">
        <img
          class="hero-image"
          src="https://avatars.githubusercontent.com/u/178721513?v=4"
          alt="GitHub 头像"
        >
        <div class="hero-overlay" aria-hidden="true"></div>
        <div class="hero-content">
          <p class="eyebrow" data-profile="kicker">技术 / 产品 / 创作</p>
          <h1 id="hero-title" data-profile="headline">你好，我正在构建自己的长期作品。</h1>
          <p class="hero-copy" data-profile="intro">
            这里会记录我正在做的项目、关注的问题，以及一些值得持续打磨的想法。
          </p>
          <div class="hero-actions" aria-label="主要操作">
            <a class="button primary" href="#projects">查看项目</a>
            <a class="button secondary" href="#contact">联系我</a>
          </div>
        </div>
      </section>

      <section class="section about-section" id="about" aria-labelledby="about-title">
        <div class="section-heading">
          <p class="eyebrow">About</p>
          <h2 id="about-title">关于我</h2>
        </div>
        <div class="about-layout">
          <p class="lead" data-profile="about">
            我喜欢把复杂问题拆成清楚的系统，也喜欢把抽象想法做成可以使用的东西。
            这个主页会随着我的经历、作品和兴趣一起更新。
          </p>
          <dl class="quick-facts" aria-label="个人信息摘要">
            <div>
              <dt>位置</dt>
              <dd data-profile="location">待补充</dd>
            </div>
            <div>
              <dt>身份</dt>
              <dd data-profile="role">待补充</dd>
            </div>
            <div>
              <dt>关注</dt>
              <dd data-profile="focus">产品、工程、写作</dd>
            </div>
          </dl>
        </div>
      </section>

      <section class="section work-section" id="work" aria-labelledby="work-title">
        <div class="section-heading">
          <p class="eyebrow">Focus</p>
          <h2 id="work-title">我关注的方向</h2>
        </div>
        <div class="focus-grid" data-render="focus"></div>
      </section>

      <section class="section projects-section" id="projects" aria-labelledby="projects-title">
        <div class="section-heading">
          <p class="eyebrow">Projects</p>
          <h2 id="projects-title">精选项目</h2>
        </div>
        <div class="project-grid" data-render="projects"></div>
      </section>

      <section class="section contact-section" id="contact" aria-labelledby="contact-title">
        <div class="contact-panel">
          <div>
            <p class="eyebrow">Contact</p>
            <h2 id="contact-title">欢迎交流</h2>
            <p data-profile="contactText">
              如果你对我的项目、合作或某个想法感兴趣，可以通过下面的方式联系我。
            </p>
          </div>
          <div class="contact-links" data-render="links"></div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <span data-profile="footer">持续更新中。</span>
      <a href="#top">回到顶部</a>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
