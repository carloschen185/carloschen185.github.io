<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>收藏夹详情</title>
    <meta name="description" content="收藏夹详情页">
    <meta name="theme-color" content="#fff4cf">

  <body data-page="collection-detail">
    <header class="site-header" aria-label="详情页导航">
